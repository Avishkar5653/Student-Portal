<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal | Contact</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fc;
}

header{
    background:#1e3a8a;
    padding:20px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:800px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
    color:#1e3a8a;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#1e3a8a;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.contact-info{
    margin-top:30px;
}

footer{
    text-align:center;
    background:#1e3a8a;
    color:white;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
<nav>
<div class="logo">Student Portal</div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
</header>

<div class="container">

<h1>Contact Us</h1>

<form>
<div class="form-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="form-group">
<label>Message</label>
<textarea rows="5" placeholder="Enter your message"></textarea>
</div>

<button type="submit">Send Message</button>
</form>

<div class="contact-info">
<h3>Contact Information</h3>
<p>Email: support@studentportal.com</p>
<p>Phone: +91 98765 43210</p>
<p>Address: Pune, Maharashtra, India</p>
</div>

</div>

<footer>
<p>© 2026 Student Portal. All Rights Reserved.</p>
</footer>

</body>
</html>
